<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  h1 { font-size: 1.6rem; margin-bottom: 6px; color: #f8fafc; }
  .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 32px; }

  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 28px;
  }

  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #94a3b8;
    cursor: pointer;
    font-size: 0.82rem;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: #6366f1;
    border-color: #6366f1;
    color: #fff;
  }

  .card-area {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .progress {
    font-size: 0.82rem;
    color: #475569;
    margin-bottom: 16px;
  }

  /* Flip card */
  .flip-wrapper {
    width: 100%;
    perspective: 1200px;
    cursor: pointer;
  }

  .flip-inner {
    position: relative;
    width: 100%;
    min-height: 340px;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
  }
  .flip-wrapper.flipped .flip-inner { transform: rotateY(180deg); }

  .flip-front, .flip-back {
    position: absolute;
    width: 100%;
    min-height: 340px;
    border-radius: 16px;
    padding: 36px 40px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .flip-front {
    background: #1e293b;
    border: 1px solid #334155;
  }

  .flip-back {
    background: #1e293b;
    border: 1px solid #6366f1;
    transform: rotateY(180deg);
  }

  .tag {
    display: inline-block;
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 12px;
    background: #312e81;
    color: #a5b4fc;
    margin-bottom: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .question {
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.5;
    color: #f1f5f9;
  }

  .hint { font-size: 0.8rem; color: #475569; margin-top: 20px; }

  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #6366f1;
    margin-bottom: 8px;
  }

  .answer { font-size: 1rem; color: #cbd5e1; line-height: 1.7; }

  .code {
    background: #0f172a;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.82rem;
    color: #a5b4fc;
    margin-top: 14px;
    line-height: 1.6;
    white-space: pre;
    overflow-x: auto;
  }

  .complexity {
    display: flex;
    gap: 16px;
    margin-top: 14px;
  }
  .complexity span {
    font-size: 0.78rem;
    color: #64748b;
  }
  .complexity b { color: #34d399; }

  /* Nav buttons */
  .nav {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    align-items: center;
  }

  .nav-btn {
    padding: 10px 28px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: #334155; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .flip-btn {
    padding: 10px 28px;
    border-radius: 8px;
    border: none;
    background: #6366f1;
    color: #fff;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .flip-btn:hover { background: #4f46e5; }

  .done-msg {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
  }
  .done-msg h2 { font-size: 1.4rem; color: #f1f5f9; margin-bottom: 8px; }
</style>
</head>
<body>

<h1>DSA Flashcards</h1>
<p class="subtitle">Click a card to reveal the answer</p>

<div class="filter-bar" id="filterBar"></div>

<div class="card-area">
  <div class="progress" id="progress"></div>

  <div class="flip-wrapper" id="flipWrapper" onclick="flipCard()">
    <div class="flip-inner" id="flipInner">
      <div class="flip-front" id="frontFace"></div>
      <div class="flip-back"  id="backFace"></div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Prev</button>
    <button class="flip-btn" onclick="flipCard()">Flip</button>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
  </div>
</div>

<script>
const cards = [
  {
    topic: "Stack",
    q: "Min Stack — Design a stack that retrieves the minimum element in O(1).",
    approach: "Store a pair (value, minSoFar) at each position. The min is always available at the top of the stack.",
    code:
`void push(int val) {
    int newMin = stack.isEmpty() ? val
               : Math.min(val, stack.peek().minSoFar);
    stack.push(new Pair(val, newMin));
}
int getMin() { return stack.peek().minSoFar; }`,
    time: "O(1)", space: "O(n)",
    gotcha: "Don't use a separate minSoFar instance variable — it goes stale after pop()."
  },
  {
    topic: "Stack",
    q: "Infix to Postfix — Convert 'a+b*(c-d)' → 'abcd-*+'",
    approach: "Scan left to right. Operands → output. '(' → push. ')' → pop until '('. Operator → pop while top has >= precedence, then push.",
    code:
`// Key while condition for operator:
while (!stack.isEmpty()
    && stack.peek() != '('
    && (ch == '^'
        ? precedence(stack.peek()) > precedence(ch)
        : precedence(stack.peek()) >= precedence(ch)))
    sb.append(stack.pop());
stack.push(ch);
// After loop: flush remaining operators`,
    time: "O(n)", space: "O(n)",
    gotcha: "3 traps: (1) empty stack check, (2) '(' guard, (3) '^' is right-associative so use '>' not '>='."
  },
  {
    topic: "Stack",
    q: "Prefix to Infix — Convert '*+ab-cd' → '((a+b)*(c-d))'",
    approach: "Scan RIGHT TO LEFT. Operand → push as string. Operator → pop two strings, combine as '(op1 OP op2)', push result.",
    code:
`for (int i = s.length()-1; i >= 0; i--) {
    char ch = s.charAt(i);
    if (Character.isLetterOrDigit(ch))
        stack.push(String.valueOf(ch));
    else {
        String op1 = stack.pop();
        String op2 = stack.pop();
        stack.push("(" + op1 + ch + op2 + ")");
    }
}
return stack.pop();`,
    time: "O(n)", space: "O(n)",
    gotcha: "Direction is the key insight — prefix is read right to left, unlike postfix which is left to right."
  },
  {
    topic: "Stack",
    q: "Valid Parentheses — Is '({[]})' valid? What about '([)]'?",
    approach: "Push open brackets. On closing bracket, check if top of stack is the matching opener. If stack is empty at end → valid.",
    code:
`for (char c : s.toCharArray()) {
    if (c=='(' || c=='{' || c=='[') stack.push(c);
    else {
        if (stack.isEmpty()) return false;
        char top = stack.pop();
        if (c==')' && top!='(') return false;
        if (c=='}' && top!='{') return false;
        if (c==']' && top!='[') return false;
    }
}
return stack.isEmpty();`,
    time: "O(n)", space: "O(n)",
    gotcha: "Always check stack.isEmpty() before peek/pop — empty stack on a closing bracket means invalid."
  }
];

let filtered = [...cards];
let current = 0;
let flipped = false;

function allTopics() {
  return [...new Set(cards.map(c => c.topic))];
}

function buildFilters() {
  const bar = document.getElementById('filterBar');
  const topics = ['All', ...allTopics()];
  topics.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (t === 'All' ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filtered = t === 'All' ? [...cards] : cards.filter(c => c.topic === t);
      current = 0;
      render();
    };
    bar.appendChild(btn);
  });
}

function render() {
  flipped = false;
  document.getElementById('flipWrapper').classList.remove('flipped');

  if (filtered.length === 0) {
    document.getElementById('frontFace').innerHTML = '<p class="question" style="color:#64748b">No cards in this category.</p>';
    document.getElementById('backFace').innerHTML = '';
    document.getElementById('progress').textContent = '';
    return;
  }

  const card = filtered[current];
  document.getElementById('progress').textContent = `${current + 1} / ${filtered.length}`;

  document.getElementById('frontFace').innerHTML = `
    <div class="tag">${card.topic}</div>
    <div class="question">${card.q}</div>
    <div class="hint">Click to reveal →</div>
  `;

  document.getElementById('backFace').innerHTML = `
    <div class="tag">${card.topic}</div>
    <div class="section-label">Approach</div>
    <div class="answer">${card.approach}</div>
    <div class="code">${card.code}</div>
    <div class="complexity">
      <span>Time: <b>${card.time}</b></span>
      <span>Space: <b>${card.space}</b></span>
    </div>
    ${card.gotcha ? `<div class="answer" style="margin-top:12px;color:#fbbf24">⚠ ${card.gotcha}</div>` : ''}
  `;

  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === filtered.length - 1;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('flipWrapper').classList.toggle('flipped', flipped);
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < filtered.length) {
    current = next;
    render();
  }
}

buildFilters();
render();
</script>
</body>
</html>
